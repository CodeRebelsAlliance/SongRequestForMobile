<?xml version="1.0" encoding="UTF-8"?>
<svg
	xmlns="http://www.w3.org/2000/svg"
	viewBox="0 0 1024 1024">

	<!-- Background -->
	<rect
		width="1024"
		height="1024"
		rx="180"
		fill="#000000"/>

	<!-- Right white panel -->
	<rect
		x="520"
		y="50"
		width="454"
		height="924"
		rx="100"
		fill="#EAEAEA"/>

	<!-- S (shifted left) -->
	<text
		x="70"
		y="700"
		font-size="600"
		font-family="Arial Black, Arial, sans-serif"
		font-weight="900"
		fill="#EAEAEA">
		S
	</text>

	<!-- R (shifted left) -->
	<text
		x="490"
		y="700"
		font-size="600"
		font-family="Arial Black, Arial, sans-serif"
		font-weight="900"
		fill="#000000">
		R
	</text>

	<!-- Label with outline for readability -->
	<text
		x="512"
		y="990"
		font-size="90"
		font-family="Arial Black, Arial, sans-serif"
		font-weight="900"
		text-anchor="middle"
		fill="#FFFFFF"
		stroke="#000000"
		stroke-width="18"
		paint-order="stroke">
		SongRequest
	</text>

</svg>